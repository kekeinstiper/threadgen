<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Viral Thread AI - Storyteller Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap");
      body {
        font-family: "Inter", sans-serif;
        background-color: #fafafa;
      }

      /* Custom Scrollbar */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: #d1d5db;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #9ca3af;
      }

      /* Thread connecting line */
      .thread-line::after {
        content: "";
        position: absolute;
        top: 40px;
        bottom: -10px;
        left: 20px;
        width: 2px;
        background-color: #e5e7eb;
        z-index: 0;
      }
      .thread-item:last-child .thread-line::after {
        display: none;
      }

      .loader {
        border-top-color: #000;
        -webkit-animation: spinner 1.5s linear infinite;
        animation: spinner 1.5s linear infinite;
      }
      @keyframes spinner {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body class="text-gray-800 antialiased min-h-screen flex flex-col">
    <!-- Header -->
    <header class="bg-white border-b border-gray-200 sticky top-0 z-10">
      <div
        class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between"
      >
        <div class="flex items-center gap-2">
          <i
            data-lucide="zap"
            class="text-yellow-500 w-6 h-6 fill-yellow-500"
          ></i>
          <h1 class="font-bold text-xl tracking-tight">
            ThreadGen<span class="text-blue-600">AI</span>
          </h1>
        </div>
        <div class="text-sm text-gray-500 font-medium flex items-center gap-1">
          <i data-lucide="sparkles" class="w-4 h-4"></i> Auto-Viral Prompter
        </div>
      </div>
    </header>

    <!-- Main Content -->
    <main
      class="flex-grow max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 w-full flex flex-col lg:flex-row gap-8"
    >
      <!-- Left Column: Input Form -->
      <div class="w-full lg:w-5/12 flex flex-col gap-6">
        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
          <h2 class="text-lg font-semibold mb-4 flex items-center gap-2">
            <i data-lucide="pen-tool" class="w-5 h-5 text-gray-600"></i>
            Bahan Cerita Kamu
          </h2>

          <form id="threadForm" class="space-y-5">
            <!-- Topik -->
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1"
                >Topik / Inti Cerita *</label
              >
              <textarea
                id="topicInput"
                rows="4"
                class="w-full rounded-xl border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 border p-3 text-sm"
                placeholder="Contoh: Pengalaman horor sewa kos murah di Jogja, ternyata bekas... Atau: Drama beli skincare palsu yang bikin muka breakout parah."
                required
              ></textarea>
            </div>

            <!-- Image Upload -->
            <div>
              <label
                class="block text-sm font-medium text-gray-700 mb-1 flex justify-between items-center"
              >
                <span>Gambar Hook (Opsional)</span>
                <span
                  class="text-xs text-blue-500 bg-blue-50 px-2 py-0.5 rounded-full"
                  >Bikin Stop Scrolling!</span
                >
              </label>
              <div
                class="mt-1 flex justify-center px-6 pt-5 pb-6 border-2 border-gray-300 border-dashed rounded-xl hover:border-blue-400 transition-colors cursor-pointer relative"
                id="dropZone"
              >
                <div class="space-y-1 text-center" id="uploadPlaceholder">
                  <i
                    data-lucide="image-plus"
                    class="mx-auto h-10 w-10 text-gray-400"
                  ></i>
                  <div class="flex text-sm text-gray-600 justify-center">
                    <label
                      for="imageInput"
                      class="relative cursor-pointer bg-white rounded-md font-medium text-blue-600 hover:text-blue-500 focus-within:outline-none"
                    >
                      <span>Upload file</span>
                      <input
                        id="imageInput"
                        name="imageInput"
                        type="file"
                        class="sr-only"
                        accept="image/*"
                      />
                    </label>
                    <p class="pl-1">atau drag and drop</p>
                  </div>
                  <p class="text-xs text-gray-500">PNG, JPG, GIF max 5MB</p>
                </div>
                <div
                  id="imagePreviewContainer"
                  class="hidden absolute inset-0 rounded-xl overflow-hidden bg-black/5 flex items-center justify-center group"
                >
                  <img
                    id="imagePreview"
                    src=""
                    alt="Preview"
                    class="h-full w-full object-cover opacity-50"
                  />
                  <button
                    type="button"
                    id="removeImageBtn"
                    class="absolute bg-white text-red-500 p-2 rounded-full shadow-lg hover:bg-red-50 transition-colors z-10 flex items-center gap-1 text-xs font-bold"
                  >
                    <i data-lucide="trash-2" class="w-4 h-4"></i> Hapus
                  </button>
                </div>
              </div>
            </div>

            <!-- Link Affiliate -->
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1"
                >Link Affiliate Shopee</label
              >
              <div class="relative rounded-md shadow-sm">
                <div
                  class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"
                >
                  <i
                    data-lucide="shopping-bag"
                    class="h-4 w-4 text-gray-400"
                  ></i>
                </div>
                <input
                  type="url"
                  id="linkInput"
                  class="focus:ring-blue-500 focus:border-blue-500 block w-full pl-10 sm:text-sm border-gray-300 rounded-xl border p-3"
                  placeholder="https://shope.ee/xxxxx"
                />
              </div>
              <p class="mt-1 text-xs text-gray-500">
                AI akan menyisipkan link ini secara halus di akhir cerita.
              </p>
            </div>

            <!-- Gaya Bahasa -->
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1"
                >Gaya Bahasa / Vibe</label
              >
              <select
                id="styleInput"
                class="w-full rounded-xl border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 border p-3 text-sm"
              >
                <option value="Curhat santai ala Twitter/Threads (gue-lo)">
                  Curhat Santai (Gue-Lo)
                </option>
                <option value="Marah-marah elegan, spill the tea">
                  Spill The Tea / Marah-marah
                </option>
                <option value="Menyedihkan, bikin simpati (aku-kamu)">
                  Sedih / Bikin Simpati (Aku-Kamu)
                </option>
                <option value="Informatif tapi asik (storytelling)">
                  Informatif & Asik
                </option>
              </select>
            </div>

            <!-- Submit Button -->
            <button
              type="submit"
              id="generateBtn"
              class="w-full flex justify-center items-center gap-2 py-3 px-4 border border-transparent rounded-xl shadow-sm text-sm font-bold text-white bg-black hover:bg-gray-800 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-gray-900 transition-all"
            >
              <i data-lucide="wand-2" class="w-4 h-4"></i>
              Generate Thread Sekarang
            </button>
          </form>

          <!-- Error Message Container -->
          <div
            id="errorMessage"
            class="hidden mt-4 p-3 bg-red-50 text-red-700 text-sm rounded-lg border border-red-100 flex items-start gap-2"
          >
            <i data-lucide="alert-circle" class="w-5 h-5 shrink-0"></i>
            <span id="errorText"></span>
          </div>
        </div>
      </div>

      <!-- Right Column: Phone Preview -->
      <div class="w-full lg:w-7/12 flex justify-center">
        <!-- Phone Mockup -->
        <div
          class="w-full max-w-[450px] bg-white rounded-[2.5rem] shadow-[0_20px_50px_-12px_rgba(0,0,0,0.15)] border-[8px] border-gray-900 overflow-hidden relative min-h-[600px] flex flex-col"
        >
          <!-- Notch/Status Bar -->
          <div
            class="bg-white h-12 w-full flex items-center justify-between px-6 pt-2 pb-1 text-xs font-medium text-black z-20 border-b border-gray-100"
          >
            <span>9:41</span>
            <div
              class="w-32 h-6 bg-gray-900 rounded-full absolute left-1/2 -translate-x-1/2 top-1"
            ></div>
            <div class="flex gap-1.5 items-center">
              <i data-lucide="signal" class="w-3.5 h-3.5"></i>
              <i data-lucide="wifi" class="w-3.5 h-3.5"></i>
              <i data-lucide="battery-full" class="w-4 h-4"></i>
            </div>
          </div>

          <!-- App Header -->
          <div
            class="px-4 py-3 border-b border-gray-100 flex items-center justify-between bg-white z-10 sticky top-0"
          >
            <i data-lucide="arrow-left" class="w-5 h-5"></i>
            <span class="font-bold">Thread</span>
            <i data-lucide="more-horizontal" class="w-5 h-5"></i>
          </div>

          <!-- Thread Content Area -->
          <div
            class="flex-grow overflow-y-auto bg-white p-4 pb-20 relative"
            id="threadContainer"
          >
            <!-- Empty State -->
            <div
              id="emptyState"
              class="h-full flex flex-col items-center justify-center text-gray-400 gap-3 mt-20"
            >
              <div
                class="w-16 h-16 bg-gray-50 rounded-full flex items-center justify-center"
              >
                <i data-lucide="smartphone" class="w-8 h-8 text-gray-300"></i>
              </div>
              <p class="text-sm text-center px-8">
                Isi form di samping untuk mulai membuat thread viralmu.
              </p>
            </div>

            <!-- Loading State -->
            <div
              id="loadingState"
              class="hidden h-full flex flex-col items-center justify-center gap-4 mt-20"
            >
              <div
                class="loader ease-linear rounded-full border-4 border-t-4 border-gray-200 h-10 w-10"
              ></div>
              <p class="text-sm text-gray-500 font-medium animate-pulse">
                AI sedang meracik hook dan cerita...
              </p>
            </div>

            <!-- Generated Threads will be injected here -->
            <div id="generatedThreads" class="hidden flex flex-col">
              <!-- Items injected by JS -->
            </div>
          </div>

          <!-- Bottom action copy all -->
          <div
            id="copyAllContainer"
            class="hidden absolute bottom-4 left-4 right-4 z-20"
          >
            <button
              id="copyAllBtn"
              class="w-full bg-blue-600 hover:bg-blue-700 text-white shadow-lg rounded-full py-3 font-semibold text-sm flex justify-center items-center gap-2 transition-colors"
            >
              <i data-lucide="copy" class="w-4 h-4"></i> Salin Semua Teks
            </button>
          </div>
        </div>
      </div>
    </main>

    <script>
      // Initialize Lucide icons
      lucide.createIcons();

      // DOM Elements
      const form = document.getElementById("threadForm");
      const generateBtn = document.getElementById("generateBtn");
      const emptyState = document.getElementById("emptyState");
      const loadingState = document.getElementById("loadingState");
      const generatedThreads = document.getElementById("generatedThreads");
      const errorMessage = document.getElementById("errorMessage");
      const errorText = document.getElementById("errorText");
      const copyAllContainer = document.getElementById("copyAllContainer");
      const copyAllBtn = document.getElementById("copyAllBtn");

      // Image Handling Elements
      const imageInput = document.getElementById("imageInput");
      const dropZone = document.getElementById("dropZone");
      const uploadPlaceholder = document.getElementById("uploadPlaceholder");
      const imagePreviewContainer = document.getElementById(
        "imagePreviewContainer",
      );
      const imagePreview = document.getElementById("imagePreview");
      const removeImageBtn = document.getElementById("removeImageBtn");

      let currentUploadedImage = null; // Store base64 image
      let currentGeneratedData = []; // Store array of threads

      // --- Image Upload Logic ---
      function handleImageSelection(file) {
        if (!file || !file.type.startsWith("image/")) {
          showError("Mohon upload file gambar yang valid (JPG, PNG).");
          return;
        }
        if (file.size > 5 * 1024 * 1024) {
          showError("Ukuran gambar terlalu besar. Maksimal 5MB.");
          return;
        }

        const reader = new FileReader();
        reader.onload = (e) => {
          currentUploadedImage = e.target.result;
          imagePreview.src = currentUploadedImage;
          uploadPlaceholder.classList.add("hidden");
          imagePreviewContainer.classList.remove("hidden");
          hideError();
        };
        reader.readAsDataURL(file);
      }

      imageInput.addEventListener("change", (e) => {
        handleImageSelection(e.target.files[0]);
      });

      // Drag and drop events
      ["dragenter", "dragover", "dragleave", "drop"].forEach((eventName) => {
        dropZone.addEventListener(eventName, preventDefaults, false);
      });

      function preventDefaults(e) {
        e.preventDefault();
        e.stopPropagation();
      }

      ["dragenter", "dragover"].forEach((eventName) => {
        dropZone.addEventListener(eventName, highlight, false);
      });

      ["dragleave", "drop"].forEach((eventName) => {
        dropZone.addEventListener(eventName, unhighlight, false);
      });

      function highlight(e) {
        dropZone.classList.add("border-blue-500", "bg-blue-50");
      }

      function unhighlight(e) {
        dropZone.classList.remove("border-blue-500", "bg-blue-50");
      }

      dropZone.addEventListener("drop", (e) => {
        let dt = e.dataTransfer;
        let files = dt.files;
        handleImageSelection(files[0]);
      });

      removeImageBtn.addEventListener("click", (e) => {
        e.stopPropagation(); // Prevent triggering file input
        currentUploadedImage = null;
        imageInput.value = "";
        imagePreview.src = "";
        imagePreviewContainer.classList.add("hidden");
        uploadPlaceholder.classList.remove("hidden");
      });

      // --- Core Application Logic ---

      // Helper to delay for exponential backoff
      const sleep = (ms) => new Promise((r) => setTimeout(r, ms));

      // Call Backend API to generate thread text
      async function fetchAIThread(topic, affiliateLink, style) {
        // Kita menembak ke server proxy buatan kita sendiri di Vercel
        const url = `/api/chat`;

        const payload = {
          topic: topic,
          affiliateLink: affiliateLink,
          style: style,
        };

        const retries = [1000, 2000, 4000, 8000, 16000];
        let lastError;

        for (let i = 0; i <= retries.length; i++) {
          try {
            const response = await fetch(url, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(payload),
            });

            if (!response.ok) {
              throw new Error(`HTTP error! status: ${response.status}`);
            }

            // Struktur data JSON yang diterima tetap sama karena diteruskan oleh backend
            const data = await response.json();
            if (data.candidates && data.candidates[0].content.parts[0].text) {
              const jsonText = data.candidates[0].content.parts[0].text;
              return JSON.parse(jsonText).threads;
            } else {
              throw new Error("Format respons tidak valid dari AI");
            }
          } catch (error) {
            lastError = error;
            if (i < retries.length) {
              await sleep(retries[i]);
            }
          }
        }
        throw lastError;
      }

      // Render Threads into UI
      function renderThreads(threadArray) {
        generatedThreads.innerHTML = "";

        threadArray.forEach((text, index) => {
          const isFirst = index === 0;

          // Format text: Convert newlines to <br>, highlight links
          let formattedText = text.replace(/\n/g, "<br>");
          // Simple link highlighter
          formattedText = formattedText.replace(
            /(https?:\/\/[^\s]+)/g,
            '<a href="$1" target="_blank" class="text-blue-500 hover:underline break-all">$1</a>',
          );

          const threadEl = document.createElement("div");
          threadEl.className = "thread-item relative flex gap-3 mb-1";

          // Profile & Line column
          const leftCol = `
                    <div class="flex flex-col items-center thread-line relative pt-1">
                        <img src="https://api.dicebear.com/7.x/notionists/svg?seed=Felix&backgroundColor=e5e7eb" class="w-10 h-10 rounded-full border border-gray-200 z-10 bg-white" alt="Avatar">
                    </div>
                `;

          // Content Column
          // Inject image only on the first thread if uploaded
          let imageHtml = "";
          if (isFirst && currentUploadedImage) {
            imageHtml = `
                        <div class="mt-3 rounded-xl overflow-hidden border border-gray-200">
                            <img src="${currentUploadedImage}" class="w-full h-auto max-h-[300px] object-cover" alt="Uploaded Context">
                        </div>
                    `;
          }

          const rightCol = `
                    <div class="flex-grow pb-5 pt-1">
                        <div class="flex items-center gap-1">
                            <span class="font-bold text-sm">Kamu</span>
                            <i data-lucide="badge-check" class="w-4 h-4 text-blue-500 fill-blue-500"></i>
                            <span class="text-gray-500 text-sm ml-1">@creator</span>
                        </div>
                        <div class="text-[15px] mt-1 text-gray-900 leading-snug">
                            ${formattedText}
                        </div>
                        ${imageHtml}
                        <div class="flex gap-6 mt-3 text-gray-400">
                            <button class="hover:text-red-500 transition-colors flex items-center gap-1.5"><i data-lucide="heart" class="w-4 h-4"></i></button>
                            <button class="hover:text-blue-500 transition-colors flex items-center gap-1.5"><i data-lucide="message-circle" class="w-4 h-4"></i></button>
                            <button class="hover:text-green-500 transition-colors flex items-center gap-1.5"><i data-lucide="repeat" class="w-4 h-4"></i></button>
                            <button onclick="copySingleThread(${index})" class="hover:text-gray-800 transition-colors flex items-center gap-1.5 ml-auto text-xs font-medium" title="Copy text ini"><i data-lucide="copy" class="w-4 h-4"></i></button>
                        </div>
                    </div>
                `;

          threadEl.innerHTML = leftCol + rightCol;
          generatedThreads.appendChild(threadEl);
        });

        // Re-initialize icons for newly added elements
        lucide.createIcons();
      }

      // Form Submit Handler
      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        hideError();

        const topic = document.getElementById("topicInput").value.trim();
        const link = document.getElementById("linkInput").value.trim();
        const style = document.getElementById("styleInput").value;

        if (!topic) {
          showError("Topik cerita tidak boleh kosong.");
          return;
        }

        // Update UI State
        generateBtn.disabled = true;
        generateBtn.innerHTML =
          '<div class="loader rounded-full border-2 border-t-2 border-white/30 border-t-white h-4 w-4"></div> Memproses...';

        emptyState.classList.add("hidden");
        generatedThreads.classList.add("hidden");
        copyAllContainer.classList.add("hidden");
        loadingState.classList.remove("hidden");

        try {
          const threads = await fetchAIThread(topic, link, style);
          currentGeneratedData = threads; // save globally for copy all

          loadingState.classList.add("hidden");
          renderThreads(threads);
          generatedThreads.classList.remove("hidden");
          copyAllContainer.classList.remove("hidden");
        } catch (err) {
          console.error("Generation Error:", err);
          loadingState.classList.add("hidden");
          emptyState.classList.remove("hidden");
          showError("Gagal menghubungi AI. Silakan coba beberapa saat lagi.");
        } finally {
          generateBtn.disabled = false;
          generateBtn.innerHTML =
            '<i data-lucide="wand-2" class="w-4 h-4"></i> Generate Thread Sekarang';
          lucide.createIcons();
        }
      });

      // Copy Functions
      window.copySingleThread = function (index) {
        if (currentGeneratedData[index]) {
          copyTextToClipboard(
            currentGeneratedData[index],
            "Teks thread disalin!",
          );
        }
      };

      copyAllBtn.addEventListener("click", () => {
        if (currentGeneratedData.length > 0) {
          const allText = currentGeneratedData.join("\n\n");
          copyTextToClipboard(allText, "Semua teks thread disalin!");
        }
      });

      function copyTextToClipboard(text, successMsg) {
        const textArea = document.createElement("textarea");
        textArea.value = text;

        // Avoid scrolling to bottom
        textArea.style.top = "0";
        textArea.style.left = "0";
        textArea.style.position = "fixed";

        document.body.appendChild(textArea);
        textArea.focus();
        textArea.select();

        try {
          const successful = document.execCommand("copy");
          if (successful) {
            // Temporarily change button text/icon (basic toast simulation)
            const originalHtml = copyAllBtn.innerHTML;
            copyAllBtn.innerHTML = `<i data-lucide="check" class="w-4 h-4"></i> Berhasil Disalin!`;
            copyAllBtn.classList.remove("bg-blue-600", "hover:bg-blue-700");
            copyAllBtn.classList.add("bg-green-600", "hover:bg-green-700");
            lucide.createIcons();

            setTimeout(() => {
              copyAllBtn.innerHTML = originalHtml;
              copyAllBtn.classList.add("bg-blue-600", "hover:bg-blue-700");
              copyAllBtn.classList.remove("bg-green-600", "hover:bg-green-700");
              lucide.createIcons();
            }, 2000);
          }
        } catch (err) {
          console.error("Fallback: Oops, unable to copy", err);
          showError("Gagal menyalin teks. Browser tidak mendukung.");
        }

        document.body.removeChild(textArea);
      }

      // Error Handling
      function showError(msg) {
        errorText.textContent = msg;
        errorMessage.classList.remove("hidden");
      }

      function hideError() {
        errorMessage.classList.add("hidden");
        errorText.textContent = "";
      }
    </script>
  </body>
</html>
